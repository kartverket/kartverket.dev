version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: backstage-postgres
    environment:
      POSTGRES_USER: admin # Admin user for PostgreSQL
      POSTGRES_PASSWORD: adminpw # Admin user password
      POSTGRES_DB: backstage # Database name for Backstage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432' # Expose PostgreSQL on port 5432
    networks:
      - backstage-network

  backstage:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    environment:
      # Database configuration
      POSTGRES_DB: backstage
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpw

      # Base URLs (app and backend)
      BASE_URL: 'http://localhost:7007'
      CORS_ORIGIN: 'http://localhost:7007'
    ports:
      - '7007:7007' # Expose Backstage on port 7007
    depends_on:
      - postgres
    networks:
      - backstage-network
    volumes:
      - ./github-secrets/github-app-backstage-skip-credentials.yaml:/app/github-secrets/github-app-backstage-skip-credentials.yaml:ro
      - ./app-config.local.yaml:/app/app-config.local.yaml:ro
    # Use local config with secrets and override database to use PostgreSQL
    command:
      [
        'packages/backend',
        '--config',
        'app-config.yaml',
        '--config',
        'app-config.local.yaml',
        '--config',
        'app-config.docker.yaml',
      ]

volumes:
  postgres_data: {}

networks:
  backstage-network:
    driver: bridge
